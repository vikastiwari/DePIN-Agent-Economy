name: Artemis Gauntlet (E2E Integration)

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  gauntlet:
    name: Run Artemis Gauntlet
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # Required for OIDC Workload Identity Federation

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # [TODO]: Uncomment and configure this block when real GCP infrastructure is provisioned.
      # You will need to create the Workload Identity Pool in GCP and store the Provider ID and Service Account in GitHub Secrets.
      # - name: Authenticate to Google Cloud (OIDC)
      #   id: auth
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      #     service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          
      # - name: Set up Cloud SDK
      #   uses: google-github-actions/setup-gcloud@v2

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install rlp eth-utils web3 pytest pytest-asyncio httpx

      - name: Run EIP-7702 RLP Serialization Test
        run: |
          pytest tests/test_eip7702_rlp.py -v

      - name: Run Full Artemis Gauntlet (E2E)
        env:
          ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
        run: |
          pytest tests/e2e_integration.py -v
