name: Artemis Gauntlet (E2E Integration)

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  gauntlet:
    name: Run Artemis Gauntlet
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # Required for OIDC Workload Identity Federation

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/123456789/locations/global/workloadIdentityPools/github-actions-pool/providers/github'
          service_account: 'artemis-ci@web3-ai-agent-economy.iam.gserviceaccount.com'
          
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install rlp eth-utils web3 pytest pytest-asyncio httpx

      - name: Run EIP-7702 RLP Serialization Test
        run: |
          pytest tests/test_eip7702_rlp.py -v

      - name: Run Full Artemis Gauntlet (E2E)
        env:
          ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
        run: |
          pytest tests/e2e_integration.py -v
